action_plan:
  summary: >
    Close the gap between strong executive sponsorship and near-zero product telemetry
    before the April board readout — prioritize provable usage on Curb Intelligence and
    unblock procurement on the sole-source addendum.
  narrative: |
    ## Recommendation

    Metro is textbook **institutional inertia**: sentiment on Cyvl stays positive in exec
    meetings while field workflows never moved off legacy curb tickets. Treat the next two
    weeks as a **usage proof sprint** — not more slides. Pair Cyvl with Maria’s chief of
    staff for daily 15m unblockers, and force a joint session with Priya on the addendum
    before Legal goes dark for Easter.

    ## Demo script hints (FDE)

    - **Today**: clear one Red Team task, walk **Moments** for “last meaningful touch” per power broker.
    - **Capture**: paste standup notes → Dry Run → commit to refresh lineage.
    - **Stakeholder**: open Maria → ledger → show conflict banner + inline patch.
    - **Risk Intel / Map**: show USES edges + telemetry from proposed queue (or Neo4j).
  tasks:
    - stakeholder_name: Maria Santos
      action: Book a 45m working session with Maria and Priya solely on the sole-source addendum blockers.
      rationale: Procurement is the gating artifact for Feb pilot expansion.
      due_by: "2026-04-21"
      priority: p0
    - stakeholder_name: James Okonkwo
      action: Route two real curb exception tickets through Cyvl Curb Intelligence with Alex shadowing.
      rationale: Without live tickets, telemetry stays artificially low.
      due_by: "2026-04-22"
      priority: p0
    - stakeholder_name: Alex Rivera
      action: Publish a one-page field runbook PDF and link it from the Metro wiki landing page.
      rationale: Removes “we didn’t know how” as an excuse for non-use.
      due_by: "2026-04-23"
      priority: p1
    - stakeholder_name: Elena Vogel
      action: Align council talking points with Maria on automation vs workforce — single narrative.
      rationale: Split messages surfaced in last week’s whisper campaign.
      due_by: "2026-04-24"
      priority: p1

